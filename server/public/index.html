<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>迅雷下载中枢</title>
    <link rel="stylesheet" href="/style.css?v=202604220033" />
  </head>
  <body>
    <main class="workspace">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <p class="eyebrow">Thunder Bridge</p>
            <h1>迅雷下载中枢</h1>
          </div>
        </div>
        <div class="connection">
          <span id="connectionDot" class="dot"></span>
          <span id="connectionText">连接中</span>
        </div>
      </header>

      <section class="command-strip" aria-label="下载控制">
        <div class="command-copy">
          <strong>新建下载</strong>
          <span>粘贴链接后由 Mac 迅雷接管，完成后自动进入媒体整理流程。</span>
        </div>
        <form id="addTaskForm" class="add-form">
          <input id="taskUrl" name="url" autocomplete="off" placeholder="magnet / http / ed2k / thunder 链接" />
          <button type="submit">立即下载</button>
        </form>
        <button id="cleanupDownloads" class="danger-button" type="button">清空下载目录</button>
        <p id="addTaskMessage" class="form-message"></p>
        <p id="cleanupMessage" class="danger-message">危险操作会清空 Mac 当前迅雷下载目录，需要二次确认。</p>
      </section>

      <section class="telemetry" aria-label="实时状态">
        <div class="speed-readout">
          <span id="speedValue">0 B/s</span>
          <small>当前总速率</small>
        </div>
        <div class="stat-line">
          <div>
            <strong id="activeTasks">0</strong>
            <span>下载中</span>
          </div>
          <div>
            <strong id="completedTasks">0</strong>
            <span>已完成</span>
          </div>
          <div>
            <strong id="totalTasks">0</strong>
            <span>任务总数</span>
          </div>
          <div>
            <strong id="macState">未知</strong>
            <span>Mac 状态</span>
          </div>
        </div>
      </section>

      <section class="main-grid">
        <section class="surface queue">
          <div class="section-head">
            <div>
              <p class="eyebrow">Queue</p>
              <div class="section-title-row">
                <h2>下载任务</h2>
                <button id="showLogs" class="text-link" type="button">查看日志</button>
              </div>
            </div>
            <span id="lastUpdate" class="subtle">等待数据</span>
          </div>
          <div id="tasks" class="task-list is-empty">暂无任务数据</div>
        </section>
      </section>
    </main>

    <section id="logWindow" class="log-window is-hidden" aria-label="日志窗口">
      <div id="logWindowHeader" class="log-window-header">
        <div class="terminal-title">
          <span></span>
          <span></span>
          <span></span>
          <strong>Thunder Bridge 日志</strong>
        </div>
        <button id="logClose" class="log-close" type="button">关闭</button>
      </div>
      <pre id="logBody" class="log-body">等待日志...</pre>
    </section>

    <script src="/app.js?v=202604220033"></script>
  </body>
</html>
