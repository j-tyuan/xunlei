services:
  thunder-bridge:
    image: node:20-alpine
    container_name: thunder-bridge
    working_dir: /app
    command: ["node", "server.js"]
    environment:
      PORT: "8098"
      THUNDER_BRIDGE_TOKEN: "change-me"
    volumes:
      - ./server.js:/app/server.js:ro
      - ./public:/app/public:ro
    ports:
      - "8098:8098"
    restart: unless-stopped
